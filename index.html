<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién eres?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <div class="petals" id="petals"></div>

    <div class="screen" id="screen-inicio">
        <div class="card">
            <span class="ornament">✦ ✦ ✦</span>
            <h1 class="title">¿Quién eres?</h1>
            <div class="btn-grid">
                <button class="btn-choice btn-f" onclick="entrar('fernanda')">
                    <span class="btn-emoji"></span>
                    Fernanda 
                    <span class="btn-sub">(GROSERA)</span>
                </button>
                <button class="btn-choice btn-k" onclick="entrar('kevin')">
                    <span class="btn-emoji"></span>
                    Kevin
                    <span class="btn-sub">(EL BUEN PEDO)</span>
                </button>
            </div>
        </div>
    </div>

    <div class="screen hidden" id="screen-panel">
        <div class="card">
            <span class="ornament">✦ ✦ ✦</span>
            <h1 class="title" id="titulo"></h1>
            <div class="clock-label">tiempo restante</div>
            <div id="cronometro">00:00:00</div>
            <div class="divider"></div>
            <div id="horitas-badge" class="horitas-badge hidden">+0 horas agregadas</div>
            <h2 id="mensajeFinal"></h2>
            <div class="controles hidden" id="controles">
                <button class="btn-ctrl" onclick="agregarHora()">+ 1 hora</button>
                <button class="btn-ctrl" onclick="quitarHora()">− 1 hora</button>
                <button id="btnReset" class="btn-tiempo hidden" onclick="resetTemporizador()">  Resetear </button>
            </div>
            <button class="btn-back" onclick="volver()">← volver</button>
        </div>
    </div>

</div>

<div id="groserias-container"></div>

<script src="script.js"></script>

</body>
</html>
